<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Coalition Decision Support v1 — 4W Coverage (Woreda)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="assets/css/app.css" />

  <style>
    /* Si ton app.css gère déjà tout, tu peux enlever ce bloc.
       Je garde un fallback minimal pour éviter page blanche si CSS casse. */
    body { margin:0; }
    #app { display:flex; height:100vh; }
    #leftPanel { width:360px; padding:14px; overflow:auto; border-right:1px solid rgba(0,0,0,.08); }
    #map { flex:1; }
    .row { display:flex; gap:10px; }
    .row > * { flex:1; }
    .kpiGrid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px; }
    .kpi { padding:10px; border:1px solid rgba(0,0,0,.08); border-radius:10px; }
    .kpi .v { font-size:18px; font-weight:700; }
    .muted { opacity:.75; font-size:12px; }
    .legend { margin-top:10px; padding:10px; border:1px solid rgba(0,0,0,.08); border-radius:10px; }
    .legendItem { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; }
    .swatch { width:16px; height:16px; border-radius:4px; border:1px solid rgba(0,0,0,.12); }
    .toolbar { display:flex; gap:10px; margin-bottom:10px; }
    select, button { width:100%; padding:10px; border-radius:10px; border:1px solid rgba(0,0,0,.15); }
    button { cursor:pointer; }
    .divider { height:1px; background:rgba(0,0,0,.08); margin:12px 0; }
    .topLinks { display:flex; gap:10px; margin-top:10px; }
    .topLinks a { text-decoration:none; font-size:13px; }
  </style>
</head>

<body>
  <div id="app">
    <aside id="leftPanel">
      <div>
        <div class="muted">Coalition Decision Support v1</div>
        <h2 style="margin:6px 0 10px 0;">4W Coverage — Woreda</h2>

        <div class="toolbar">
          <div style="flex:1;">
            <label class="muted" for="regionSelect">Region</label>
            <select id="regionSelect">
              <option value="">All regions</option>
            </select>
          </div>
          <div style="flex:1;">
            <label class="muted" for="zoneSelect">Zone</label>
            <select id="zoneSelect" disabled>
              <option value="">All zones</option>
            </select>
          </div>
        </div>

        <button id="resetBtn" type="button">Reset view</button>

        <div class="divider"></div>

        <div class="kpiGrid">
          <div class="kpi">
            <div class="muted">Woredas (in view / filtered)</div>
            <div class="v" id="kpiWoredas">—</div>
          </div>
          <div class="kpi">
            <div class="muted">Total NGOs (sum)</div>
            <div class="v" id="kpiNgos">—</div>
          </div>
          <div class="kpi">
            <div class="muted">Total activities (sum)</div>
            <div class="v" id="kpiActivities">—</div>
          </div>
          <div class="kpi">
            <div class="muted">Records (sum)</div>
            <div class="v" id="kpiRecords">—</div>
          </div>
        </div>

        <div class="legend" id="legendBox">
          <div style="font-weight:700; margin-bottom:6px;">Legend — NGO count</div>
          <div class="legendItem"><span class="swatch" data-swatch="c0"></span> 0</div>
          <div class="legendItem"><span class="swatch" data-swatch="c1"></span> 1</div>
          <div class="legendItem"><span class="swatch" data-swatch="c2"></span> 2</div>
          <div class="legendItem"><span class="swatch" data-swatch="c3"></span> 3–4</div>
          <div class="legendItem"><span class="swatch" data-swatch="c4"></span> 5–7</div>
          <div class="legendItem"><span class="swatch" data-swatch="c5"></span> 8+</div>
          <div class="muted" style="margin-top:8px;">
            Tip: click a woreda to drill down (fit to bounds).
          </div>
        </div>

        <div class="topLinks">
          <a href="index.html">Home</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="map.html">LMRI map</a>
        </div>
      </div>
    </aside>

    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Conservé pour cohérence de repo (helpers éventuels, constants, etc.) -->
  <script src="js/common.js"></script>

  <script src="js/map_4w.js"></script>
</body>
</html>
