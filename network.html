<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coordination Network</title>

<style>
  body{
    margin:0;
    background:#0b0f14;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
  }
  #network{
    width:100%;
    height:100vh;
  }
  .header{
    position:absolute;
    top:18px;
    left:26px;
    z-index:10;
    font-size:18px;
    font-weight:600;
    opacity:0.92;
    user-select:none;
    pointer-events:none;
  }
  .subheader{
    position:absolute;
    top:42px;
    left:26px;
    z-index:10;
    font-size:12px;
    opacity:0.65;
    user-select:none;
    pointer-events:none;
  }
  .legend{
    position:absolute;
    top:18px;
    right:22px;
    z-index:10;
    font-size:12px;
    opacity:0.8;
    user-select:none;
    pointer-events:none;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    padding: 10px 12px;
    backdrop-filter: blur(6px);
  }
  .legend-row{ display:flex; align-items:center; gap:8px; margin:6px 0; }
  .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }
  .dot.org{ background: rgba(80,170,255,0.92); }
  .dot.act{ background: rgba(110,230,160,0.92); }
  .dot.wor{ background: rgba(255,120,120,0.92); }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/dist/vis-network.min.css">
</head>

<body>

<div class="header">Nutrition Cluster Network — v2.1</div>
<div class="subheader">Drag to pan · Scroll to zoom · Hover a node to reveal links</div>

<div class="legend">
  <div class="legend-row"><span class="dot org"></span> NGOs</div>
  <div class="legend-row"><span class="dot act"></span> Activities</div>
  <div class="legend-row"><span class="dot wor"></span> Woredas</div>
</div>

<div id="network"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.6/dist/vis-network.min.js"></script>
<script src="assets/js/network.js"></script>

</body>
</html>
